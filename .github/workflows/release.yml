name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdchk-linux-amd64
          path: spdchk
          retention-days: 1

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdchk-linux-arm64
          path: spdchk
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag and changelog
        id: version
        run: |
          VERSION="$(grep -oP '(?<=#define SPDCHK_VERSION ")([^"]+)' spdchk.h)"
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

          PREV_TAG="$(git tag --sort=-creatordate | head -n 1)"
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="$(git log --pretty=format:'- %s (%h)' | head -n 50)"
          else
            CHANGELOG="$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)')"
          fi

          # Write multi-line changelog to GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: spdchk-linux-amd64
          path: dist/amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: spdchk-linux-arm64
          path: dist/arm64

      - name: Rename binaries
        run: |
          mv dist/amd64/spdchk dist/spdchk-linux-amd64
          mv dist/arm64/spdchk dist/spdchk-linux-arm64
          chmod +x dist/spdchk-linux-amd64 dist/spdchk-linux-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## What's Changed

            ${{ steps.version.outputs.changelog }}

            ---

            | Asset | Architecture |
            |-------|-------------|
            | `spdchk-linux-amd64` | Linux x86-64 (Intel/AMD) |
            | `spdchk-linux-arm64` | Linux AArch64 (ARM 64-bit) |
          files: |
            dist/spdchk-linux-amd64
            dist/spdchk-linux-arm64
