name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdchk-linux-amd64
          path: spdchk
          retention-days: 1

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdchk-linux-arm64
          path: spdchk
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: write

    steps:
      - name: Compute version tag
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y%m%d')"
          echo "tag=v${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: spdchk-linux-amd64
          path: dist/amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: spdchk-linux-arm64
          path: dist/arm64

      - name: Rename binaries
        run: |
          mv dist/amd64/spdchk dist/spdchk-linux-amd64
          mv dist/arm64/spdchk dist/spdchk-linux-arm64
          chmod +x dist/spdchk-linux-amd64 dist/spdchk-linux-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Automated release from commit ${{ github.sha }}.

            | Asset | Architecture |
            |-------|-------------|
            | `spdchk-linux-amd64` | Linux x86-64 (Intel/AMD) |
            | `spdchk-linux-arm64` | Linux AArch64 (ARM 64-bit) |
          files: |
            dist/spdchk-linux-amd64
            dist/spdchk-linux-arm64
